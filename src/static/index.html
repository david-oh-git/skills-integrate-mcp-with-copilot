<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="admin-container">
        <h3>Admin: Manage Activities</h3>
        <form id="admin-form">
          <div class="form-group">
            <label for="admin-activity-name">Activity Name:</label>
            <input type="text" id="admin-activity-name" required placeholder="Chess Club" />
          </div>
          <div class="form-group">
            <label for="admin-description">Description:</label>
            <input type="text" id="admin-description" required placeholder="Activity description" />
          </div>
          <div class="form-group">
            <label for="admin-schedule">Schedule:</label>
            <input type="text" id="admin-schedule" required placeholder="Mondays, 3:30 PM - 4:30 PM" />
          </div>
          <div class="form-group">
            <label for="admin-max-participants">Max Participants:</label>
            <input type="number" id="admin-max-participants" required min="1" value="10" />
          </div>
          <button type="submit" id="admin-submit-button">Add Activity</button>
          <button type="button" id="cancel-edit" class="hidden">Cancel Edit</button>
        </form>
        <p class="admin-note">Use the Edit and Delete buttons on each card to manage an activity.</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
